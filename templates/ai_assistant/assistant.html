{% extends "base.html" %}
{% block title %}AI Assistant — WorkHub{% endblock %}
{% block page_title %}AI Assistant{% endblock %}

{% block content %}
<div class="row justify-content-center">
  <div class="col-lg-8">

    <!-- Header card -->
    <div class="card mb-4" style="background:linear-gradient(135deg,#1e1b4b,#312e81) !important;border:none !important;">
      <div class="card-body p-4">
        <div class="d-flex align-items-center gap-3">
          <div style="width:48px;height:48px;border-radius:14px;background:linear-gradient(135deg,#6366f1,#8b5cf6);display:flex;align-items:center;justify-content:center;font-size:1.3rem;">
            <i class="bi bi-stars text-white"></i>
          </div>
          <div>
            <h5 class="text-white fw-bold mb-0" style="letter-spacing:-.02em;">AI Assistant</h5>
            <p class="mb-0" style="color:rgba(255,255,255,.55);font-size:.83rem;">Powered by GPT-4o-mini · Summarize & draft replies instantly</p>
          </div>
        </div>
      </div>
    </div>

    <!-- Input card -->
    <div class="card mb-4">
      <div class="card-body p-4">
        <label class="fw-semibold mb-2" style="font-size:.85rem;color:#374151;">
          <i class="bi bi-envelope me-1 text-muted"></i>Paste email content
        </label>
        <textarea id="email-input" class="form-control" rows="9"
                  placeholder="Paste the email you want to summarize or reply to\u2026" style="resize:vertical;"></textarea>
        <div class="d-flex gap-2 mt-3 flex-wrap">
          <button class="btn btn-primary" onclick="triggerAI('summarize')">
            <i class="bi bi-list-task me-2"></i>Summarize
          </button>
          <button class="btn btn-outline-primary" onclick="triggerAI('reply')">
            <i class="bi bi-reply me-2"></i>Generate Reply
          </button>
        </div>
      </div>
    </div>

    <!-- Response card -->
    <div id="ai-response-box" class="card d-none">
      <div class="card-body p-4">
        <div class="d-flex align-items-center mb-3">
          <div style="width:28px;height:28px;border-radius:8px;background:linear-gradient(135deg,#6366f1,#8b5cf6);display:flex;align-items:center;justify-content:center;margin-right:10px;">
            <i class="bi bi-stars text-white" style="font-size:.75rem;"></i>
          </div>
          <span class="fw-semibold" style="font-size:.9rem;">AI Response</span>
          <button class="btn btn-sm btn-outline-secondary ms-auto" onclick="copyResult()" style="font-size:.78rem;">
            <i class="bi bi-clipboard me-1"></i>Copy
          </button>
        </div>
        <p id="ai-content" class="mb-0" style="white-space:pre-wrap;font-size:.88rem;line-height:1.7;"></p>
      </div>
    </div>

  </div>
</div>
{% endblock %}

{% block extra_js %}
<script>
function triggerAI(type) {
  const text = document.getElementById("email-input").value.trim();
  if (!text) { alert("Please paste an email first."); return; }
  runAI(type, text, "{{ csrf_token }}");
}
function copyResult() {
  const text = document.getElementById("ai-content").textContent;
  navigator.clipboard.writeText(text).then(() => {
    const btn = event.target.closest("button");
    btn.innerHTML = '<i class="bi bi-check me-1"></i>Copied!';
    setTimeout(() => btn.innerHTML = '<i class="bi bi-clipboard me-1"></i>Copy', 1500);
  });
}
</script>
{% endblock %}
