{% extends "base.html" %}
{% block title %}Compose — Gmail — WorkHub{% endblock %}
{% block page_title %}Compose Email{% endblock %}

{% block content %}
<div class="page-header mb-4">
  <div class="d-flex align-items-center gap-2">
    <div style="width:32px;height:32px;border-radius:9px;background:linear-gradient(135deg,#4285F4,#34A853);display:flex;align-items:center;justify-content:center;">
      <i class="bi bi-pencil-square text-white" style="font-size:.85rem;"></i>
    </div>
    <h5 class="mb-0" style="font-size:.95rem;">Compose Email</h5>
  </div>
  <a href="{% url 'google_hub:inbox' %}" class="btn btn-sm btn-outline-secondary">
    <i class="bi bi-arrow-left me-1"></i>Back to Inbox
  </a>
</div>

<div class="card">
  <div class="card-body p-4">
    <form method="post" action="{% url 'google_hub:compose' %}">
      {% csrf_token %}

      <div class="mb-3">
        <label for="to_email" class="form-label fw-semibold" style="font-size:.85rem;">To</label>
        <input type="email" class="form-control" id="to_email" name="to_email"
               value="{{ to_email|default:request.GET.to }}" placeholder="recipient@example.com" required
               style="border-radius:10px;">
      </div>

      <div class="mb-3">
        <label for="subject" class="form-label fw-semibold" style="font-size:.85rem;">Subject</label>
        <input type="text" class="form-control" id="subject" name="subject"
               value="{{ subject|default:request.GET.subject }}" placeholder="Email subject" required
               style="border-radius:10px;">
      </div>

      <div class="mb-3">
        <label for="body" class="form-label fw-semibold" style="font-size:.85rem;">Message</label>
        <textarea class="form-control" id="body" name="body" rows="12"
                  placeholder="Write your message here..." required
                  style="border-radius:10px;resize:vertical;">{{ body }}</textarea>
      </div>

      <div class="d-flex gap-2">
        <button type="submit" class="btn btn-primary">
          <i class="bi bi-send me-2"></i>Send
        </button>
        <a href="{% url 'google_hub:inbox' %}" class="btn btn-outline-secondary">Cancel</a>
      </div>
    </form>
  </div>
</div>
{% endblock %}
