{% extends "base.html" %}
{% block title %}Compose — Gmail — WorkHub{% endblock %}
{% block page_title %}Compose Email{% endblock %}

{% block content %}
<div class="hub-header">
  <div class="hub-icon hub-icon--gmail">
    <i data-lucide="pencil" class="lucide"></i>
  </div>
  <div class="flex-grow-1">
    <h4 class="hub-title">Compose Email</h4>
    <p class="hub-sub">Google Workspace</p>
  </div>
  <a href="{% url 'google_hub:inbox' %}" class="hub-btn-secondary">
    <i data-lucide="arrow-left" class="lucide"></i>Back to Inbox
  </a>
</div>

<div class="gh-compose-card">
  <div class="card-body p-4">
    <form method="post" action="{% url 'google_hub:compose' %}">
      {% csrf_token %}

      <div class="mb-3">
        <label for="to_email" class="form-label">To</label>
        <input type="email" class="form-control" id="to_email" name="to_email"
               value="{{ to_email }}" placeholder="recipient@example.com" required>
      </div>

      <div class="mb-3">
        <label for="subject" class="form-label">Subject</label>
        <input type="text" class="form-control" id="subject" name="subject"
               value="{{ subject }}" placeholder="Email subject" required>
      </div>

      <div class="mb-3">
        <label for="body" class="form-label">Message</label>
        <textarea class="form-control" id="body" name="body" rows="12"
                  placeholder="Write your message here..." required
                  style="resize:vertical;">{{ body }}</textarea>
      </div>

      <div class="d-flex gap-2">
        <button type="submit" class="btn hub-btn-create">
          <i data-lucide="send" class="lucide me-2"></i>Send
        </button>
        <a href="{% url 'google_hub:inbox' %}" class="btn hub-btn-secondary">Cancel</a>
      </div>
    </form>
  </div>
</div>
{% endblock %}
