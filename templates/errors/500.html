{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Server Error — WorkHub</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="{% static 'css/tokens.css' %}" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: var(--font);
      background: var(--surface);
      color: var(--ink);
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      -webkit-font-smoothing: antialiased;
    }
    .err { text-align: center; max-width: 420px; padding: 24px; }
    .err-code {
      font-size: 120px;
      font-weight: 800;
      line-height: 1;
      background: linear-gradient(135deg, var(--red) 0%, var(--amber) 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      letter-spacing: -4px;
    }
    .err-title {
      font-size: 20px;
      font-weight: 700;
      margin-top: 8px;
      color: var(--gray-900);
    }
    .err-desc {
      font-size: 14px;
      color: var(--gray-500);
      margin-top: 8px;
      line-height: 1.6;
    }
    .err-btn {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      margin-top: 24px;
      padding: 10px 24px;
      background: var(--gradient-brand);
      color: #fff;
      border: none;
      border-radius: var(--r-md);
      font-size: 14px;
      font-weight: 600;
      text-decoration: none;
      cursor: pointer;
      transition: opacity .15s;
    }
    .err-btn:hover { opacity: .9; }
    .err-btn svg { width: 16px; height: 16px; }
  </style>
</head>
<body>
  <div class="err">
    <div class="err-code">500</div>
    <div class="err-title">Something Went Wrong</div>
    <p class="err-desc">An unexpected error occurred. Our team has been notified. Please try again later.</p>
    <a href="/" class="err-btn">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m3 9 9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
      Go Home
    </a>
  </div>
</body>
</html>
