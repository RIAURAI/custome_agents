{% extends "base.html" %}
{% block title %}Compose Email — WorkHub{% endblock %}
{% block page_title %}Compose Email{% endblock %}

{% block content %}
<div class="page-header mb-4">
  <div class="d-flex align-items-center gap-2">
    <div style="width:32px;height:32px;border-radius:9px;background:var(--primary-light);display:flex;align-items:center;justify-content:center;">
      <i data-lucide="pencil" class="lucide" style="color:var(--primary);"></i>
    </div>
    <h5 class="mb-0" style="font-size:.95rem;">New Email</h5>
  </div>
  <a href="{% url 'email_hub:inbox' %}" class="btn btn-sm btn-outline-secondary">
    <i data-lucide="arrow-left" class="lucide me-1"></i>Back to Inbox
  </a>
</div>

<div class="row justify-content-center">
  <div class="col-lg-8">
    <div class="card">
      <div class="card-body p-4">
        <form method="post" novalidate>
          {% csrf_token %}
          <div class="mb-3">
            <label class="form-label fw-semibold" style="font-size:.83rem;color:#374151;">To</label>
            <input type="email" name="to_email" class="form-control"
                   value="{{ request.GET.to|default:'' }}"
                   placeholder="recipient@example.com" required />
          </div>
          <div class="mb-3">
            <label class="form-label fw-semibold" style="font-size:.83rem;color:#374151;">Subject</label>
            <input type="text" name="subject" class="form-control"
                   value="{{ request.GET.subject|default:'' }}"
                   placeholder="Email subject" required />
          </div>
          <div class="mb-4">
            <label class="form-label fw-semibold" style="font-size:.83rem;color:#374151;">Message</label>
            <textarea name="body" class="form-control" rows="12"
                      placeholder="Write your message here…" required></textarea>
          </div>
          <div class="d-flex gap-2">
            <button type="submit" class="btn btn-primary px-4">
              <i data-lucide="send" class="lucide me-2"></i>Send
            </button>
            <a href="{% url 'email_hub:inbox' %}" class="btn btn-outline-secondary">Cancel</a>
          </div>
        </form>
      </div>
    </div>
  </div>
</div>
{% endblock %}
