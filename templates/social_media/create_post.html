{% extends "base.html" %}
{% block title %}New Post — Social Media — WorkHub{% endblock %}

{% block content %}
<!-- Header -->
<div class="hub-header">
  <div class="d-flex align-items-center gap-3">
    <div class="hub-icon" style="background:var(--gradient-brand)"><i data-lucide="edit-3" class="lucide"></i></div>
    <div>
      <h1 class="hub-title">Create Post</h1>
      <p class="hub-subtitle">Compose and publish to your connected accounts</p>
    </div>
  </div>
  <div class="d-flex align-items-center gap-2">
    <a href="{% url 'social_media:posts_list' %}" class="hub-btn-secondary"><i data-lucide="arrow-left" class="lucide"></i> Posts</a>
  </div>
</div>

<div class="dash-panel" style="max-width:640px">
  <div class="dash-panel-body">
    <form method="post">
      {% csrf_token %}
      <div class="mb-3">
        <label class="hub-label">Account</label>
        <select name="account" class="hub-input" required>
          <option value="">Select account…</option>
          {% for acct in accounts %}
          <option value="{{ acct.pk }}">{{ acct.get_platform_display }} — {{ acct.account_name }}</option>
          {% endfor %}
        </select>
      </div>
      <div class="mb-3">
        <label class="hub-label">Content</label>
        <textarea name="content" class="hub-input" rows="5" required placeholder="Write your post…"></textarea>
      </div>
      <div class="mb-4">
        <label class="hub-label">Media URL (optional)</label>
        <input type="url" name="media_url" class="hub-input" placeholder="https://example.com/image.jpg">
      </div>
      <div class="d-flex gap-2">
        <button type="submit" name="action" value="draft" class="hub-btn-secondary"><i data-lucide="save" class="lucide"></i> Save Draft</button>
        <button type="submit" name="action" value="publish" class="hub-btn-create"><i data-lucide="send" class="lucide"></i> Publish Now</button>
      </div>
    </form>
  </div>
</div>
{% endblock %}

{% block extra_js %}
<script>lucide.createIcons();</script>
{% endblock %}
