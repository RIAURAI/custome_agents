{% extends "base.html" %}
{% block title %}Edit Bot Rule — Social Media — WorkHub{% endblock %}

{% block content %}
<!-- Header -->
<div class="hub-header">
  <div class="d-flex align-items-center gap-3">
    <div class="hub-icon" style="background:var(--gradient-brand)"><i data-lucide="bot" class="lucide"></i></div>
    <div>
      <h1 class="hub-title">Edit Auto-Reply Rule</h1>
      <p class="hub-subtitle">{{ rule.get_platform_display|default:rule.platform }}</p>
    </div>
  </div>
  <div class="d-flex align-items-center gap-2">
    <a href="{% url 'social_media:bot_settings' %}" class="hub-btn-secondary"><i data-lucide="arrow-left" class="lucide"></i> Bot Settings</a>
  </div>
</div>

<div class="dash-panel" style="max-width:640px">
  <div class="dash-panel-body">
    <form method="post">
      {% csrf_token %}
      <div class="row g-3 mb-3">
        <div class="col-md-6">
          <label class="hub-label">Platform</label>
          <select name="platform" class="hub-input" required>
            {% for val, label in platform_choices %}
            <option value="{{ val }}" {% if rule.platform == val %}selected{% endif %}>{{ label }}</option>
            {% endfor %}
          </select>
        </div>
        <div class="col-md-6">
          <label class="hub-label">Account (optional)</label>
          <select name="account" class="hub-input">
            <option value="">All accounts</option>
            {% for acct in accounts %}
            <option value="{{ acct.pk }}" {% if rule.account_id == acct.pk %}selected{% endif %}>{{ acct.get_platform_display }} — {{ acct.account_name }}</option>
            {% endfor %}
          </select>
        </div>
      </div>
      <div class="row g-3 mb-3">
        <div class="col-md-6">
          <label class="hub-label">Persona Name (optional)</label>
          <input type="text" name="persona_name" class="hub-input" value="{{ rule.persona_name }}">
        </div>
        <div class="col-md-3">
          <label class="hub-label">Enabled</label>
          <div class="mt-1">
            <label class="d-flex align-items-center gap-1 cursor-pointer" style="font-size:13px">
              <input type="checkbox" name="is_enabled" {% if rule.is_enabled %}checked{% endif %}> Active
            </label>
          </div>
        </div>
        <div class="col-md-3">
          <label class="hub-label">Auto-Send</label>
          <div class="mt-1">
            <label class="d-flex align-items-center gap-1 cursor-pointer" style="font-size:13px">
              <input type="checkbox" name="auto_send" {% if rule.auto_send %}checked{% endif %}> Auto
            </label>
          </div>
        </div>
      </div>
      <div class="mb-3">
        <label class="hub-label">Keywords (comma-separated, empty = all messages)</label>
        <input type="text" name="keywords" class="hub-input" value="{{ rule.keywords }}">
      </div>
      <div class="mb-3">
        <label class="hub-label">Reply to</label>
        <div class="d-flex gap-3">
          <label class="d-flex align-items-center gap-1 cursor-pointer" style="font-size:13px">
            <input type="checkbox" name="reply_to_dms" {% if rule.reply_to_dms %}checked{% endif %}> DMs
          </label>
          <label class="d-flex align-items-center gap-1 cursor-pointer" style="font-size:13px">
            <input type="checkbox" name="reply_to_comments" {% if rule.reply_to_comments %}checked{% endif %}> Comments
          </label>
          <label class="d-flex align-items-center gap-1 cursor-pointer" style="font-size:13px">
            <input type="checkbox" name="reply_to_groups" {% if rule.reply_to_groups %}checked{% endif %}> Groups
          </label>
        </div>
      </div>
      <div class="mb-4">
        <label class="hub-label">Custom AI Instructions</label>
        <textarea name="custom_instructions" class="hub-input" rows="3">{{ rule.custom_instructions }}</textarea>
      </div>
      <div class="d-flex gap-2">
        <a href="{% url 'social_media:bot_settings' %}" class="hub-btn-secondary">Cancel</a>
        <button type="submit" class="hub-btn-create"><i data-lucide="check" class="lucide"></i> Save Changes</button>
      </div>
    </form>
  </div>
</div>
{% endblock %}

{% block extra_js %}
<script>lucide.createIcons();</script>
{% endblock %}
